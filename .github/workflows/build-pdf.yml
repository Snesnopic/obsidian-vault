name: Build and Publish Notes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-science python3

      - name: Generate Master Files
        run: |
          chmod +x generate-master.sh
          ./generate-master.sh

      - name: Prepare Build Assets
        run: |
          cat <<'EOF' > header.tex
          \usepackage{amsmath}
          \usepackage{amssymb}
          \usepackage{stmaryrd}
          EOF

          cat <<'EOF' > fix_links.py
          import re
          import sys

          def slugify(text):
              text = text.lower()
              text = re.sub(r'[^a-z0-9\s-]', '', text)
              text = re.sub(r'\s+', '-', text)
              return text

          def replace_link(match):
              content = match.group(1)
              slug = slugify(content)
              return f"[{content}](#{slug})"

          data = sys.stdin.read()
          data = re.sub(r'\[\[#([^\]]+)\]\]', replace_link, data)
          sys.stdout.write(data)
          EOF

      - name: Build Root PDFs
        run: |
          mkdir -p output_pdfs
          shopt -s nullglob
          
          for file in *.md; do
            if [[ "$file" == "README.md" ]]; then continue; fi
            
            echo "PROCESSING: $file"
            base="${file%.md}"

            echo "FIXING LINKS..."
            python3 fix_links.py < "$file" > clean_body.md

            echo "COMPILING PDF..."
            # Use command line flags instead of a YAML metadata block
            pandoc clean_body.md -o "output_pdfs/${base}.pdf" \
              -V geometry:margin=1in \
              -V colorlinks:true \
              --include-in-header=header.tex \
              --pdf-engine=pdflatex || {
                echo "PANDOC ERROR ON $file"
                echo "SHOWING FIRST 40 LINES OF clean_body.md:"
                nl -ba clean_body.md | head -n 40
                exit 1
            }

            rm clean_body.md
          done
          
          rm header.tex fix_links.py
      - name: Inject web assets
        run: |
          # copy web files to the publish directory
          cp -a web/. output_pdfs/
          echo "WEB ASSETS COPIED TO OUTPUT"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output_pdfs
          enable_jekyll: true
          keep_files: true