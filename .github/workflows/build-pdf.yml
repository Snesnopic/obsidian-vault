name: Build PDFs

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc & LaTeX
        run: sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Generate Master Files
        run: |
          chmod +x generate-master.sh
          ./generate-master.sh

      - name: Build Root PDFs
        run: |
          # 1. Create a temporary YAML header with global LaTeX definitions
          # This ensures \trans, \sem, etc. are defined before the document starts.
          cat <<EOF > metadata.yaml
          ---
          geometry: margin=1in
          header-includes:
            - \usepackage{amsmath}
            - \usepackage{amssymb}
            - \usepackage{stmaryrd}
            # Use \providecommand so we don't crash if packages define these
            - \providecommand{\sem}[1]{ [\![ #1 ]\!] }
            - \providecommand{\den}[1]{\mathcal{#1}}
            - \providecommand{\floor}[1]{\lfloor #1 \rfloor}
            - \providecommand{\trans}[1]{\xrightarrow{#1}}
            - \providecommand{\wtrans}[1]{\stackrel{#1}{\Longrightarrow}}
            - \providecommand{\nat}{\mathbb{N}}
          ---
          EOF

          # 2. Loop through root markdown files
          shopt -s nullglob
          for file in *.md; do
            if [[ "$file" == "README.md" ]]; then continue; fi
            
            echo "Processing $file..."
            base="${file%.md}"
            
            # 3. Sanitize the Markdown Stream using sed
            # - Remove lines trying to redefine \mathbb (causes crash)
            # - Change \newcommand to \providecommand (prevents "Command already defined" crash)
            cat "$file" | \
            sed '/\\newcommand{\\mathbb}/d' | \
            sed 's/\\newcommand/\\providecommand/g' > "clean_$file"
            
            # 4. Compile: Header + Cleaned Content
            pandoc "metadata.yaml" "clean_$file" -o "${base}.pdf" --pdf-engine=pdflatex
            
            # Cleanup temp file
            rm "clean_$file"
          done
          
          # Cleanup header
          rm metadata.yaml

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: "*.pdf"