name: Build PDFs

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Pandoc & LaTeX
        run: sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-science

      - name: Generate Master Files
        run: |
          chmod +x generate-master.sh
          ./generate-master.sh

      - name: Build Root PDFs
        run: |
          # 1. Create metadata.yaml with SAFE HEADER generation
          # CRITICAL: We use 'EOF' (single quotes). 
          # This stops Bash from eating the backslashes in \usepackage and \newcommand.
          cat <<'EOF' > metadata.yaml
          ---
          geometry: margin=1in
          header-includes:
            - |
              \usepackage{amsmath}
              \usepackage{amssymb}
              \usepackage{stmaryrd}
              \providecommand{\sem}[1]{ [\![ #1 ]\!] }
              \providecommand{\den}[1]{\mathcal{#1}}
              \providecommand{\floor}[1]{\lfloor #1 \rfloor}
              \providecommand{\trans}[1]{\xrightarrow{#1}}
              \providecommand{\wtrans}[1]{\stackrel{#1}{\Longrightarrow}}
              \providecommand{\nat}{\mathbb{N}}
          ---
          EOF

          # 2. Loop through root markdown files safely
          shopt -s nullglob
          
          for file in *.md; do
            # Skip README
            if [[ "$file" == "README.md" ]]; then continue; fi
            
            echo "Processing $file..."
            base="${file%.md}"
            
            # 3. Sanitize Body Content
            # Step A: Remove \newcommand{\mathbb} lines to prevent "Command already defined" errors
            # Step B: Convert other \newcommand to \providecommand so they don't conflict with our header
            sed '/\\newcommand{\\mathbb}/d' "$file" | sed 's/\\newcommand/\\providecommand/g' > "clean_body.md"
            
            # 4. Compile
            # metadata.yaml supplies the header definitions
            # clean_body.md supplies the content
            pandoc "metadata.yaml" "clean_body.md" -o "${base}.pdf" --pdf-engine=pdflatex
            
            rm "clean_body.md"
          done
          
          rm metadata.yaml

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: "*.pdf"